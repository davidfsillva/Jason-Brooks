<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Trainer | Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Placeholder for TTF Answer font, you need to host/import it if available -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Anton', sans-serif; /* Replace with TTF Answer if you have it */
        }

        /* Background gradient */
        body {
            background: linear-gradient(135deg, #d4003b, #560047);
            color: #fff;
        }

        /* Header */
        header {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            margin: 0 15px;
            font-size: 16px;
            transition: 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        .btn-member {
            padding: 10px 25px;
            border: 2px solid #fff;
            border-radius: 25px;
            background: transparent;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-member:hover {
            background: #fff;
            color: #560047;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 90px;
            letter-spacing: 20px;
            color: #fff;
        }

        .hero p {
            font-size: 20px;
            max-width: 600px;
            margin-bottom: 30px;
            color: #fff;
        }

        .hero img {
            width: 400px;
            max-width: 90%;
            margin-top: 30px;
            border-radius: 10px;
        }

        /* Social icons bottom left */
        .social-icons {
            position: absolute;
            bottom: 20px;
            left: 30px;
            display: flex;
            gap: 20px;
        }

        .social-icons a {
            color: #fff;
            font-size: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icons a:hover {
            opacity: 0.7;
        }

        /* Scroll down */
        .scroll-down {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: #fff;
            font-size: 16px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 60px;
                letter-spacing: 10px;
            }

            .hero p {
                font-size: 16px;
            }

            header {
                padding: 15px 20px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 40px;
                letter-spacing: 5px;
            }

            .hero p {
                font-size: 14px;
            }

            .hero img {
                width: 250px;
            }

            .scroll-down {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#hiring">Hiring</a>
        </nav>
        <button class="btn-member">Become A Member</button>
    </header>

    <section class="hero">
        <p>Where fitness meets passion and results become reality!</p>
        <h1>COACH</h1>
        <img src="img/1 (1).png" alt="Personal Trainer"> <!-- Substitua pela imagem real -->
        <div class="social-icons">
            <a href="#">F</a>
            <a href="#">I</a>
            <a href="#">X</a>
        </div>
        <div class="scroll-down">Scroll to Explore</div>
    </section>
</body>
</html>
